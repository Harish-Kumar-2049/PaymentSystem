spring:
  application:
    name: PaymentSystem

  datasource:
    url: jdbc:postgresql://localhost:5432/payments_db
    username: postgres
    password: harishkumar
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: password

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes

server:
  port: 8080

jwt:
  secret: ThisIsAVeryLongSecretKeyForJWTSigningMustBe256BitsLongAtLeast!!
  expiration: 86400000
